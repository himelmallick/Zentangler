  <!-- Middle workflow -->
  <!-- Stage 1 -->
  <rect x="562" y="88" width="150" height="285" rx="10" class="soft-blue"/>
  <text x="637" y="128" text-anchor="middle" class="section-title">1) First-Layer</text>
  <text x="637" y="158" text-anchor="middle" class="section-title">Screen</text>
  <text x="637" y="193" text-anchor="middle" class="text">A-stage</text>
  <text x="637" y="224" text-anchor="middle" class="math">X -> M<tspan baseline-shift="super" font-size="13">(1)</tspan></text>
