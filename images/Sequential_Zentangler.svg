  <text x="637" y="850" text-anchor="middle" class="text">Outcome model</text>
  <text x="637" y="881" text-anchor="middle" class="math">X + M<tspan baseline-shift="super" font-size="13">(k)</tspan> -> Y</text>
  <text x="637" y="918" text-anchor="middle" class="small">early / intermediate / late</text>

