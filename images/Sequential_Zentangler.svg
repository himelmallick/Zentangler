  <text x="1196" y="257" text-anchor="middle" class="label">Output</text>
  <text x="1196" y="286" text-anchor="middle" class="small">selected</text>
  <text x="1196" y="308" text-anchor="middle" class="small">M<tspan baseline-shift="super" font-size="11">(1)</tspan></text>

