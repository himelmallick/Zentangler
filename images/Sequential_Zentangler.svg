  <text x="637" y="535" text-anchor="middle" class="text">Adjacent layers</text>
  <text x="637" y="566" text-anchor="middle" class="math">M<tspan baseline-shift="super" font-size="13">(l)</tspan> -> M<tspan baseline-shift="super" font-size="13">(l+1)</tspan></text>
  <text x="637" y="604" text-anchor="middle" class="small">correlation screen</text>
  <text x="637" y="626" text-anchor="middle" class="small">estimate link coefficient</text>
  <text x="637" y="653" text-anchor="middle" class="math">d<tspan baseline-shift="sub" font-size="13">l,l+1</tspan></text>

  <rect x="730" y="430" width="550" height="260" rx="12" class="box"/>
  <text x="1005" y="466" text-anchor="middle" class="section-title">Build explicit sequential mediator paths</text>
