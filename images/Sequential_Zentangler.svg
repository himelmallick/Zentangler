<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160">
  <defs>
    <style>
      .title { font: 700 25px Georgia, serif; fill: #ffffff; }
      .section-title { font: 700 19px Georgia, serif; fill: #111111; }
      .text { font: 16px Georgia, serif; fill: #111111; }
      .small { font: 13px Georgia, serif; fill: #111111; }
      .tiny { font: 12px Georgia, serif; fill: #111111; }
      .math { font: italic 18px Georgia, serif; fill: #111111; }
      .label { font: 700 16px Georgia, serif; fill: #111111; }
      .blue { fill: #0a4fbf; }
      .orange { fill: #f28a13; }
      .green { fill: #18957f; }
      .purple { fill: #5d269f; }
      .navy { fill: #001a5a; }
      .muted { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #c7c7c7; stroke-width: 2; }
      .soft-blue { fill: #eef6ff; stroke: #5093ff; stroke-width: 2; }
      .soft-orange { fill: #fff5e8; stroke: #f2a23b; stroke-width: 2; }
