  <text x="1003" y="870" text-anchor="middle" class="text">Intermediate Fusion: cooperative integration</text>
  <rect x="785" y="905" width="435" height="48" rx="10" fill="#ffffff" stroke="#c7c7c7" stroke-width="1.8"/>
  <text x="1003" y="935" text-anchor="middle" class="text">Late Fusion: combine terminal view-specific evidence</text>

