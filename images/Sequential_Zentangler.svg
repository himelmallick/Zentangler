      .dashed { stroke-dasharray: 10 8; }
      .link-arrow { stroke: #0b2b75; stroke-width: 4; fill: none; marker-end: url(#blueArrow); }
      .thin { stroke-width: 1.5; }
      .gridline { stroke: #d9d9d9; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111111"/>
    </marker>
    <marker id="blueArrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#0b2b75"/>
    </marker>
