  <rect x="1195" y="515" width="48" height="48" class="green"/>
  <text x="1015" y="596" text-anchor="middle" class="text">retain links passing |cor| and q thresholds</text>
  <text x="1015" y="631" text-anchor="middle" class="text">path score includes a x d<tspan baseline-shift="sub" font-size="13">12</tspan> x ... x b</text>

